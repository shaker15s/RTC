<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Words - Fixed Arrow Alignment</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --color-dark: #212529;
        }

        /* ─── Fixed HorizontalWords Section ────────────────────────────────────────────── */
        .horizontal-words-section {
          position: relative;
          width: 100%;
          height: 100vh;
          min-height: 700px;
          background-color: var(--bg-color);
          overflow: hidden;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        /* Container for text and arrows - uses flexbox for proper alignment */
        .horizontal-words__content-wrapper {
          position: relative;
          padding-inline: 10vw;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.4em;
          z-index: 5;
          width: 100%;
          max-width: 80vw;
        }

        /* ─── Arrows - Now positioned relatively within the content wrapper ─────────── */
        .horizontal-words__arrow-svg {
          width: 100%;
          max-width: 60em;
          color: var(--color-dark);
          z-index: 2;
          opacity: 0.6;
          align-self: flex-start;
          flex-shrink: 0;
        }

        .horizontal-words__arrow-end-svg {
          width: 4em;
          color: var(--color-dark);
          z-index: 2;
          opacity: 0.5;
          align-self: flex-end;
          flex-shrink: 0;
        }

        /* Sticker layer - positioned relative to content wrapper */
        .horizontal-words__sticker-svg {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 15;
        }

        /* Stickers remain absolutely positioned as they're decorative elements */
        .horizontal-words__sticker {
          position: absolute;
          color: var(--color-dark);
          pointer-events: none;
        }

        .horizontal-words__sticker svg {
          width: 100%;
          height: 100%;
        }

        /* Watch sticker - top left */
        .horizontal-words__sticker-watch {
          width: 5.5em;
          top: 8%;
          left: 5%;
          transform: rotate(-15deg);
        }

        /* Cursor sticker - top right */
        .horizontal-words__sticker-cursor {
          width: 5em;
          top: 10%;
          right: 7%;
          transform: rotate(12deg);
        }

        /* Phone sticker - right side */
        .horizontal-words__sticker-phone {
          width: 5.5em;
          top: 48%;
          right: 4%;
          transform: rotate(-8deg);
        }

        /* ─── Text Elements ─────────────────────────────────────────────────────────── */
        /* Arabic headline */
        .horizontal-words__h2 {
          font-size: clamp(3rem, 8vw, 9rem);
          line-height: 1.2;
          font-weight: 900;
          margin: 0;
          text-transform: none;
          position: relative;
          z-index: 5;
          font-family: 'Tajawal', 'Epilogue', sans-serif;
          letter-spacing: 0;
          direction: rtl;
          text-align: right;
          white-space: normal;
          word-break: keep-all;
          overflow-wrap: normal;
          align-self: stretch;
        }

        /* English headline */
        .horizontal-words__headline-en {
          font-family: 'Epilogue', sans-serif;
          font-weight: 900;
          font-size: clamp(1.5rem, 3.5vw, 3.5rem);
          line-height: 1.1;
          margin-top: 0.3em;
          letter-spacing: -0.02em;
          opacity: 0.55;
          color: var(--color-dark);
          unicode-bidi: isolate;
          text-align: center;
          white-space: nowrap;
          align-self: stretch;
        }

        /* Animated elements */
        .horizontal-words__letter,
        .horizontal-words__word {
          display: inline-block;
          will-change: transform, opacity;
        }

        .horizontal-words__space {
          display: inline-block;
          width: 0.3em;
        }

        /* Underlay text */
        .horizontal-words__underlay {
          font-family: 'Tajawal', 'Epilogue', sans-serif;
          font-weight: 500;
          font-style: normal;
          font-size: clamp(1rem, 1.8vw, 1.5rem);
          letter-spacing: 0;
          opacity: 0.75;
          color: var(--color-dark);
          text-align: right;
          margin-top: 0.4em;
          align-self: stretch;
        }

        .horizontal-words__underlay-en {
          font-family: 'Epilogue', sans-serif;
          font-weight: 400;
          font-style: italic;
          font-size: clamp(0.8rem, 1.2vw, 1.05rem);
          opacity: 0.5;
          color: var(--color-dark);
          unicode-bidi: isolate;
          text-align: center;
          margin-top: 0.15em;
          align-self: stretch;
        }

        /* Bottom text */
        .horizontal-words__bottom-text {
          position: absolute;
          bottom: 5vh;
          left: 50%;
          transform: translateX(-50%);
          width: max-content;
          max-width: 85vw;
          text-align: center;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.3em;
          z-index: 20;
        }

        .horizontal-words__bottom-text-l {
          font-family: 'Tajawal', 'Epilogue', sans-serif;
          font-weight: 500;
          font-size: clamp(0.85rem, 1.3vw, 1.2rem);
          line-height: 1.6;
          max-width: 40em;
          color: var(--color-dark);
          text-align: right;
        }

        .horizontal-words__bottom-text-en {
          font-family: 'Epilogue', sans-serif;
          font-style: italic;
          font-weight: 400;
          font-size: clamp(0.7rem, 1vw, 0.9rem);
          opacity: 0.5;
          letter-spacing: -0.01em;
          unicode-bidi: isolate;
          color: var(--color-dark);
          text-align: center;
        }
    </style>
</head>
<body>
    <section class="horizontal-words-section">
        <!-- Content wrapper - uses flexbox to align text and arrows properly -->
        <div class="horizontal-words__content-wrapper">
            <!-- Sticker layer -->
            <div class="horizontal-words__sticker-svg">
                <!-- Decorative stickers -->
                <span class="horizontal-words__sticker horizontal-words__sticker-watch" aria-hidden="true">
                    <!-- Watch SVG would go here -->
                </span>

                <span class="horizontal-words__sticker horizontal-words__sticker-cursor" aria-hidden="true">
                    <!-- Cursor SVG would go here -->
                </span>

                <span class="horizontal-words__sticker horizontal-words__sticker-phone" aria-hidden="true">
                    <!-- Phone SVG would go here -->
                </span>
            </div>

            <!-- Main curved arrow -->
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="100%"
                viewBox="0 0 386 127"
                fill="none"
                className="horizontal-words__arrow-svg"
                aria-hidden="true"
            >
                <path
                    d="M2 123C9 35.9999 84.5 17 124 25.9999C217.764 47.3635 207 115 177.5 123C105.777 142.45 110.737 1.99991 232.5 2C310.5 2.00006 366.5 79 376 118L356.5 105.5"
                    stroke="currentColor"
                    strokeWidth="3"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                />
                <path
                    d="M2 123C9 35.9999 84.5 17 124 25.9999C217.764 47.3635 207 115 177.5 123C105.777 142.45 110.737 1.99991 232.5 2C310.5 2.00006 366.5 79 376 118L384 97"
                    stroke="currentColor"
                    strokeWidth="3"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                />
            </svg>

            <!-- Arabic headline -->
            <h2
                className="display horizontal-words__h2"
                lang="ar"
                dir="rtl"
                aria-label="التعليم حق."
            >
                <span class="horizontal-words__word-wrapper">
                    <span class="horizontal-words__word" lang="ar">التعليم</span>
                    <span class="horizontal-words__space" aria-hidden="true">&nbsp;</span>
                </span>
                <span class="horizontal-words__word-wrapper">
                    <span class="horizontal-words__word" lang="ar">حق.</span>
                </span>
            </h2>

            <!-- English headline -->
            <h3 className="horizontal-words__headline-en" lang="en" dir="ltr" aria-label="Education is a right.">
                <span class="horizontal-words__letter" lang="en">E</span>
                <span class="horizontal-words__letter" lang="en">d</span>
                <span class="horizontal-words__letter" lang="en">u</span>
                <span class="horizontal-words__letter" lang="en">c</span>
                <span class="horizontal-words__letter" lang="en">a</span>
                <span class="horizontal-words__letter" lang="en">t</span>
                <span class="horizontal-words__letter" lang="en">i</span>
                <span class="horizontal-words__letter" lang="en">o</span>
                <span class="horizontal-words__letter" lang="en">n</span>
                <span class="horizontal-words__space" aria-hidden="true">&nbsp;</span>
                <span class="horizontal-words__letter" lang="en">i</span>
                <span class="horizontal-words__letter" lang="en">s</span>
                <span class="horizontal-words__space" aria-hidden="true">&nbsp;</span>
                <span class="horizontal-words__letter" lang="en">a</span>
                <span class="horizontal-words__space" aria-hidden="true">&nbsp;</span>
                <span class="horizontal-words__letter" lang="en">r</span>
                <span class="horizontal-words__letter" lang="en">i</span>
                <span class="horizontal-words__letter" lang="en">g</span>
                <span class="horizontal-words__letter" lang="en">h</span>
                <span class="horizontal-words__letter" lang="en">t</span>
                <span class="horizontal-words__letter" lang="en">.</span>
            </h3>

            <!-- Arabic underlay -->
            <h3 className="horizontal-words__underlay" lang="ar" dir="rtl">
                مجاناً لكل شاب مصري.
            </h3>

            <!-- English underlay -->
            <p className="horizontal-words__underlay-en" lang="en" dir="ltr">
                Free for every young Egyptian.
            </p>

            <!-- End arrow -->
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="4em"
                viewBox="0 0 140 127"
                fill="none"
                className="horizontal-words__arrow-end-svg"
                aria-hidden="true"
            >
                <path d="M2.03125 2.42188C100.469 2.42188 130.156 52.4219 118.437 125.078L99.6875 107.891" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                <path d="M2.03125 2.42188C100.469 2.42188 130.156 52.4219 118.438 125.078L137.969 110.234" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        </div>

        <!-- Bottom text -->
        <div className="horizontal-words__bottom-text">
            <div className="horizontal-words__bottom-text-l" lang="ar" dir="rtl">
                دورات مجانية. وظائف حقيقية. مفتوح كل شهر.
            </div>
            <div className="horizontal-words__bottom-text-en" lang="en" dir="ltr">
                Free courses. Real careers. Open every month.
            </div>
        </div>
    </section>
</body>
</html>
